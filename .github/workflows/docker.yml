name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o webssh-${{ matrix.suffix }} ./cmd/webssh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webssh-${{ matrix.suffix }}
          path: webssh-${{ matrix.suffix }}

  docker:
    name: Build & Push Docker Image
    needs: build  # 等 build job 跑完再执行
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 下载 build job 产出的两个二进制
      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: webssh-linux-amd64
          path: dist

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: webssh-linux-arm64
          path: dist

      - name: Set executable bit
        run: chmod +x dist/*

      # 支持构建多架构镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub，需要在仓库 Settings → Secrets 里添加：
      #   DOCKERHUB_USERNAME  你的 Docker Hub 用户名
      #   DOCKERHUB_TOKEN     Docker Hub 生成的 Access Token
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 自动生成镜像标签：push v1.2.3 tag 时会生成 1.2.3 和 latest
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/webssh
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      # 写 Dockerfile，直接 COPY 已构建好的二进制，不在容器里编译
      - name: Write Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM scratch
          ARG TARGETARCH
          COPY dist/webssh-linux-${TARGETARCH} /webssh
          EXPOSE 8888
          ENTRYPOINT ["/webssh"]
          EOF

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
